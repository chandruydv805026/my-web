<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ratu Fresh - Chat with Priya ✨</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #e8f5e9, #c8e6c9);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .chat-container {
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        h2 { color: #2e7d32; margin-bottom: 5px; }
        p.subtitle { color: #666; font-size: 14px; margin-top: 0; margin-bottom: 25px; }
        
        .lion-container {
            width: 140px;
            height: 140px;
            margin: 20px auto;
            background: #f1f8e9;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 70px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
            transition: all 0.4s ease;
            position: relative;
            cursor: pointer;
        }
        
        .listening-active {
            background: #e8f5e9;
            box-shadow: 0 0 25px #24b637;
            animation: pulse-green 1.5s infinite;
        }
        .speaking-active {
            background: #fff3e0;
            box-shadow: 0 0 25px #ff9800;
            animation: pulse-orange 1.2s infinite;
        }
        .thinking-active {
            background: #e1f5fe;
            box-shadow: 0 0 25px #0288d1;
        }

        @keyframes pulse-green {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
        @keyframes pulse-orange {
            0% { transform: scale(1); }
            50% { transform: scale(1.08); }
            100% { transform: scale(1); }
        }
        
        .status-text { margin-top: 20px; font-weight: bold; color: #444; min-height: 24px; }
        .live-transcript { margin-top: 5px; font-size: 13px; color: #666; font-style: italic; min-height: 18px; }
        
        .response-box {
            margin-top: 25px;
            padding: 15px;
            background: #f9f9f9;
            border-left: 5px solid #24b637;
            border-radius: 5px;
            text-align: left;
            display: none;
        }
        .response-box h4 { margin: 0 0 5px 0; color: #2e7d32; }
        .response-box p { margin: 0; color: #333; font-size: 15px; }
    </style>
</head>
<body>

<div class="chat-container">
    <h2>Ratu Fresh AI Assistant</h2>
    <p class="subtitle">Talk to Priya for fresh vegetables! 🥬</p>
    
    <div id="lionAvatar" class="lion-container">🦁</div>
    
    <div id="statusText" class="status-text">Tap the Lion to connect...</div>
    <div id="liveTranscript" class="live-transcript"></div>

    <div id="responseBox" class="response-box">
        <h4>Priya:</h4>
        <p id="replyText"></p>
    </div>
</div>

<script>
    const lionAvatar = document.getElementById('lionAvatar');
    const statusText = document.getElementById('statusText');
    const liveTranscript = document.getElementById('liveTranscript');
    const responseBox = document.getElementById('responseBox');
    const replyText = document.getElementById('replyText');

    let mediaRecorder;
    let audioChunks = [];
    let recognition;
    let transcribedText = "";
    let isFirstClick = true;
    let silenceTimer;
    let isIntentionalStop = false; // Mobile auto-disconnect guard flag

    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (SpeechRecognition) {
        recognition = new SpeechRecognition();
        recognition.lang = 'hi-IN';
        recognition.continuous = true;
        recognition.interimResults = true;

        recognition.onresult = (event) => {
            clearTimeout(silenceTimer);
            let currentTranscript = "";
            for (let i = event.resultIndex; i < event.results.length; ++i) {
                if (event.results[i].isFinal) {
                    transcribedText += event.results[i][0].transcript + " ";
                } else {
                    currentTranscript += event.results[i][0].transcript;
                }
            }
            
            liveTranscript.innerText = "Aapne bola: " + (transcribedText + currentTranscript);

            // Mobile friendly dynamic silence handling (2.5 seconds window)
            silenceTimer = setTimeout(() => {
                if (mediaRecorder && mediaRecorder.state === "recording") {
                    console.log("Auto-submitting due to natural pause...");
                    isIntentionalStop = true;
                    stopRecordingProcess();
                }
            }, 2500); 
        };

        recognition.onend = () => {
            // 🔥 MAIN MOBILE FIX: Agar mobile browser hardware bina hamare roke auto-off ho jaye
            // toh use forcefully dobara restart kar do jab tak hum khud submit na karein!
            if (!isIntentionalStop && mediaRecorder && mediaRecorder.state === "recording") {
                console.log("Mobile browser dropped mic. Force restarting framework...");
                try { recognition.start(); } catch(e) {}
            }
        };

        recognition.onerror = (event) => {
            console.log("Speech Error:", event.error);
            if (event.error === 'aborted') return; // Ignore accidental logs
            if (event.error !== 'no-speech') {
                isIntentionalStop = true;
                setLionState('waiting', "Tap lion to retry.");
                stopRecordingProcess();
            }
        };
    }

    lionAvatar.addEventListener('click', () => {
        if (isFirstClick) {
            isFirstClick = false;
            setLionState('thinking', "Connecting to Priya...");
            const welcomeText = "Swagat hai aapka Ratu Fresh me! Mai Chandan ki AI assistant Priya bol rahi hu. Boliye bhaiya, kaun si fresh sabzi chahiye aapko?";
            
            setLionState('speaking', "Priya is speaking...");
            speakOut(welcomeText, () => {
                startRecordingProcess();
            });
        } else {
            if (mediaRecorder && mediaRecorder.state === "recording") {
                isIntentionalStop = true;
                stopRecordingProcess();
            } else {
                startRecordingProcess();
            }
        }
    });

    async function startRecordingProcess() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            audioChunks = [];
            transcribedText = ""; 
            isIntentionalStop = false; // Reset security flag
            
            mediaRecorder = new MediaRecorder(stream, { mimeType: 'audio/webm' });
            
            mediaRecorder.ondataavailable = (e) => {
                if (e.data.size > 0) audioChunks.push(e.data);
            };

            mediaRecorder.onstop = async () => {
                setLionState('thinking', "Priya is thinking...");
                const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
                
                setTimeout(async () => {
                    const cleanText = transcribedText.trim();
                    await sendDataToBackend(audioBlob, cleanText || "Hello Priya");
                }, 400);
            };

            mediaRecorder.start();
            if (recognition) {
                try { recognition.start(); } catch(e) {}
            }
            
            setLionState('listening', "Listening... Speak now!");
        } catch (err) {
            alert("Microphone access denied.");
            isFirstClick = true;
        }
    }

    function stopRecordingProcess() {
        clearTimeout(silenceTimer);
        if (recognition) {
            try { recognition.stop(); } catch(e) {}
        }
        if (mediaRecorder && mediaRecorder.state === "recording") {
            mediaRecorder.stop();
        }
        micBtn.classList.remove('recording');
    }

    async function sendDataToBackend(audioBlob, textContent) {
        const formData = new FormData();
        formData.append('audioBlob', audioBlob, 'user-voice.webm');
        formData.append('userText', textContent);
        formData.append('userName', "Instagram Visitor");

        try {
            const res = await fetch('/api/ratu-fresh-ai', {
                method: 'POST',
                body: formData
            });
            const data = await res.json();
            
            if (data.success) {
                liveTranscript.innerText = ""; 
                responseBox.style.display = "block";
                replyText.innerText = data.reply;
                
                setLionState('speaking', "Priya is replying...");
                speakOut(data.reply, () => {
                    startRecordingProcess();
                });
            } else {
                setLionState('waiting', "Please try again.");
            }
        } catch (err) {
            setLionState('waiting', "Server error.");
        }
    }

    function setLionState(state, statusMsg) {
        statusText.innerText = statusMsg;
        lionAvatar.className = "lion-container"; 
        
        if (state === 'listening') {
            lionAvatar.innerText = "🦁👂";
            lionAvatar.classList.add('listening-active');
        } else if (state === 'speaking') {
            lionAvatar.innerText = "🦁🗣️";
            lionAvatar.classList.add('speaking-active');
        } else if (state === 'thinking') {
            lionAvatar.innerText = "🦁🧠";
            lionAvatar.classList.add('thinking-active');
        } else {
            lionAvatar.innerText = "🦁💤";
        }
    }

    function speakOut(text, onEndCallback) {
        if ('speechSynthesis' in window) {
            window.speechSynthesis.cancel();
            
            const cleanText = text.replace(/[^a-zA-Z0-9 space,?.!अ-हॉा-्]/g, "");
            const utterance = new SpeechSynthesisUtterance(cleanText);
            
            utterance.lang = 'hi-IN';
            utterance.rate = 1.0; 
            utterance.pitch = 1.35;
            
            utterance.onend = () => {
                if (onEndCallback) onEndCallback();
            };
            
            window.speechSynthesis.speak(utterance);
        } else {
            if (onEndCallback) onEndCallback();
        }
    }
</script>

</body>
</html>
