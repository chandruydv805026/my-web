<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ratu Fresh - Chat with Priya ✨</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #e8f5e9, #c8e6c9);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .chat-container {
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        h2 { color: #2e7d32; margin-bottom: 5px; }
        p.subtitle { color: #666; font-size: 14px; margin-top: 0; margin-bottom: 25px; }
        
        .mic-btn {
            background: #24b637;
            color: white;
            border: none;
            width: 100px;
            height: 100px;
            border-radius: 50%;
            font-size: 40px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(36, 182, 55, 0.4);
            transition: all 0.3s ease;
            outline: none;
        }
        .mic-btn:active { transform: scale(0.95); }
        .recording {
            background: #ff4444;
            animation: pulse 1.5s infinite;
            box-shadow: 0 5px 15px rgba(255, 68, 68, 0.4);
        }
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.08); }
            100% { transform: scale(1); }
        }

        .status-text { margin-top: 20px; font-weight: bold; color: #444; min-height: 24px; }
        .live-transcript { margin-top: 5px; font-size: 13px; color: #777; font-style: italic; min-height: 18px; }
        .response-box {
            margin-top: 25px;
            padding: 15px;
            background: #f9f9f9;
            border-left: 5px solid #24b637;
            border-radius: 5px;
            text-align: left;
            display: none;
        }
        .response-box h4 { margin: 0 0 5px 0; color: #2e7d32; }
        .response-box p { margin: 0; color: #333; font-size: 15px; }
    </style>
</head>
<body>

<div class="chat-container">
    <h2>Ratu Fresh AI Assistant</h2>
    <p class="subtitle">Talk to Priya for fresh vegetables! 🥬</p>
    
    <button id="micBtn" class="mic-btn">🎙️</button>
    <div id="statusText" class="status-text">Tap the mic to start...</div>
    <div id="liveTranscript" class="live-transcript"></div>

    <div id="responseBox" class="response-box">
        <h4>Priya:</h4>
        <p id="replyText"></p>
    </div>
</div>

<script>
    const micBtn = document.getElementById('micBtn');
    const statusText = document.getElementById('statusText');
    const liveTranscript = document.getElementById('liveTranscript');
    const responseBox = document.getElementById('responseBox');
    const replyText = document.getElementById('replyText');

    let mediaRecorder;
    let audioChunks = [];
    let recognition;
    let transcribedText = "";
    let isFirstClick = true;

    // 1. Inbuilt Speech Recognition Engine Advanced Setup
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (SpeechRecognition) {
        recognition = new SpeechRecognition();
        recognition.lang = 'hi-IN'; // Catch Hindi/Hinglish perfectly
        recognition.continuous = true; // Keep listening until manual stop
        recognition.interimResults = true; // Live update text stream

        recognition.onresult = (event) => {
            let currentTranscript = "";
            for (let i = event.resultIndex; i < event.results.length; ++i) {
                if (event.results[i].isFinal) {
                    transcribedText += event.results[i][0].transcript + " ";
                } else {
                    currentTranscript += event.results[i][0].transcript;
                }
            }
            // Screen par live text display karein taaki maloom chale browser sun raha hai
            liveTranscript.innerText = "Aapne bola: " + (transcribedText + currentTranscript);
        };

        recognition.onerror = (event) => {
            console.log("Speech API Error:", event.error);
            if (event.error !== 'no-speech') {
                statusText.innerText = "Error occurred. Tap mic to retry.";
                stopRecordingProcess();
            }
        };
    }

    // Mic Button Core Event Handler
    micBtn.addEventListener('click', async () => {
        // Welcome Greeting Flow Handler
        if (isFirstClick) {
            isFirstClick = false;
            statusText.innerText = "Connecting to Priya...";
            const welcomeText = "Swagat hai aapka Ratu Fresh me! Mai Chandan ki AI assistant Priya bol rahi hu. Boliye bhaiya, kaun si fresh sabzi chahiye aapko?";
            speakOut(welcomeText);
            
            // Priya ka welcome message bolkar poora hote hi recording system auto chalu hoga
            setTimeout(() => {
                startRecordingProcess();
            }, 6800);
            return;
        }

        if (mediaRecorder && mediaRecorder.state === "recording") {
            stopRecordingProcess();
        } else {
            startRecordingProcess();
        }
    });

    async function startRecordingProcess() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            audioChunks = [];
            transcribedText = ""; 
            liveTranscript.innerText = "Sun rahi hu... Boliye!";
            
            mediaRecorder = new MediaRecorder(stream, { mimeType: 'audio/webm' });
            
            mediaRecorder.ondataavailable = (e) => {
                if (e.data.size > 0) audioChunks.push(e.data);
            };

            mediaRecorder.onstop = async () => {
                statusText.innerText = "Processing voice...";
                const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
                
                // Halqa sa buffer delay taaki browser final tokens catch kar sake
                setTimeout(async () => {
                    const cleanText = transcribedText.trim();
                    console.log("Final Sent Text:", cleanText);
                    // Agar speech recognition catch na kare toh default fallback text apply
                    sendDataToBackend(audioBlob, cleanText || "Hello Priya");
                }, 400);
            };

            mediaRecorder.start();
            if (recognition) {
                recognition.start();
            }
            
            micBtn.classList.add('recording');
            statusText.innerText = "Listening... Speak now!";
        } catch (err) {
            alert("Microphone access blocked or not supported.");
            isFirstClick = true;
        }
    }

    function stopRecordingProcess() {
        if (mediaRecorder && mediaRecorder.state === "recording") mediaRecorder.stop();
        if (recognition) recognition.stop();
        micBtn.classList.remove('recording');
    }

    // Backend Delivery Pipe
    async function sendDataToBackend(audioBlob, textContent) {
        const formData = new FormData();
        formData.append('audioBlob', audioBlob, 'user-voice.webm');
        formData.append('userText', textContent);
        formData.append('userName', "Instagram Visitor");

        try {
            const res = await fetch('/api/ratu-fresh-ai', {
                method: 'POST',
                body: formData
            });
            const data = await res.json();
            
            if (data.success) {
                statusText.innerText = "Tap mic to speak again";
                liveTranscript.innerText = ""; // clear old string logs
                responseBox.style.display = "block";
                replyText.innerText = data.reply;
                
                // Voice playback call
                speakOut(data.reply);
            } else {
                statusText.innerText = "Priya could not process the request.";
            }
        } catch (err) {
            statusText.innerText = "Server error. Try again.";
        }
    }

    // Native Speech Synthesizer
    function speakOut(text) {
        if ('speechSynthesis' in window) {
            window.speechSynthesis.cancel(); // kill active traces instantly
            
            const cleanText = text.replace(/[^a-zA-Z0-9 space,?.!अ-हॉा-्]/g, "");
            const utterance = new SpeechSynthesisUtterance(cleanText);
            
            utterance.lang = 'hi-IN';
            utterance.rate = 1.0; 
            utterance.pitch = 1.35; // Standard high female dynamic tone
            
            window.speechSynthesis.speak(utterance);
        }
    }
</script>

</body>
</html>
